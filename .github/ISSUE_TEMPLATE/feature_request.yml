name: Feature request
description: Propose a bounded ENTO improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator, reader, or implementer problem does this solve?
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - "documentation"
        - "CLI compatibility-preserving"
        - "conformance"
        - "benchmark or visualization"
        - "security hardening"
        - "future breaking format"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and any compatibility constraints.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What tests, fixtures, docs, or render gates should prove it?
