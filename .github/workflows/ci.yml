name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check src/ scripts/ tests/
      - name: Type check (mypy)
        run: uv run mypy src/
      - name: Test with coverage
        run: uv run python scripts/run_tests.py
      - name: Analysis pipeline smoke
        run: uv run python scripts/ento_analysis.py
      - name: Conformance fixtures
        run: |
          uv run python scripts/generate_conformance_fixtures.py
          uv run python scripts/verify_conformance_fixtures.py
      - name: Figure layout gate
        run: uv run python scripts/check_figure_layout.py
      - name: Release bundle gate
        run: uv run python scripts/build_release_bundle.py
      - name: Package and console-script smoke
        run: |
          dist="$RUNNER_TEMP/ento-dist"
          venv="$RUNNER_TEMP/ento-venv"
          uv build --out-dir "$dist"
          uv venv --python "${{ matrix.python-version }}" "$venv"
          uv pip install --python "$venv/bin/python" "$dist"/*.whl
          "$venv/bin/entofile" --version
